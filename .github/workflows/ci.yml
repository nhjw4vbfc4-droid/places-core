name: CI

# Compiles the shared package for iOS — the platform both apps ship — on its
# own, independent of either app. Fast + cheap (a tiny library), so it runs on
# every push and PR. Uses xcodebuild (not `swift build`) so it targets iOS
# rather than the macOS CI host.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (iOS)
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Xcode version
        run: xcodebuild -version
      - name: Schemes
        run: xcodebuild -list
      - name: Build for iOS
        run: xcodebuild build -scheme PlacesCore -destination 'generic/platform=iOS'
